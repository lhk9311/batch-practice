spring:
  application:
    name: batch-practice

  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@localhost:1521:xe
    username: system
    password: sistsix

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

mybatis:
